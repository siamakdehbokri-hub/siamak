<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="سیامک دهبکری، مدیر برند و کارگردان تبلیغاتی"
    />
    <meta name="robots" content="index, follow" />
    <meta name="color-scheme" content="dark" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="سیامک دهبکری، مدیر برند و کارگردان تبلیغاتی" />
    <meta
      property="og:description"
      content="سیامک دهبکری، مدیر برند و کارگردان تبلیغاتی"
    />
    <meta property="og:image" content="assets/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#090807" />
    <title>سیامک دهبکری، مدیر برند و کارگردان تبلیغاتی</title>
    <link rel="preload" href="assets/hero-perception.svg" as="image" />
    <link rel="preload" href="assets/fonts/iransans/IRANSans-Regular.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="assets/fonts/iransans/IRANSans-Medium.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="loading-screen" aria-hidden="true">
      <div class="loading-mark">SD</div>
      <p>
        <span dir="rtl">ادراک، قبل از توضیح شکل می‌گیرد.&rlm;</span>
        <span dir="ltr">Perception is shaped before explanation.</span>
        <span dir="rtl">هەستپێکردن پێش ڕوونکردنەوە شێوە دەگرێت.&rlm;</span>
      </p>
    </div>
    <div class="grain" aria-hidden="true"></div>
    <div class="scroll-progress" aria-hidden="true"></div>
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>
    <div class="mood-light" aria-hidden="true"></div>
    <div class="cursor-orb" aria-hidden="true"></div>

    <header class="site-header" data-reveal>
      <a class="brand" href="#top" aria-label="Siamak Dehbokri home">
        <span>SD</span>
        <small data-i18n="brand.name"></small>
        <em data-brand-whisper></em>
      </a>

      <nav class="nav" aria-label="Primary navigation" data-main-nav>
        <a href="#work" data-i18n="nav.work"></a>
        <a href="#method" data-i18n="nav.method"></a>
        <a href="#identity" data-i18n="nav.identity"></a>
        <a href="#contact" data-i18n="nav.contact"></a>
      </nav>

      <div class="header-actions">
        <div class="language-switcher" aria-label="Language switcher">
          <button type="button" data-lang="fa" aria-label="فارسی">فا</button>
          <button type="button" data-lang="ku" aria-label="کوردی">KU</button>
          <button type="button" data-lang="en" aria-label="English">EN</button>
        </div>
      </div>
    </header>

    <main id="top">
      <noscript>
        <section class="noscript-message section-shell">
          برای مشاهده نسخه کامل سه‌زبانه و تجربه حرکتی سایت، لطفا JavaScript را فعال کنید.
        </section>
      </noscript>

      <section class="hero section-shell" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="eyebrow" data-reveal data-i18n="hero.eyebrow"></p>
          <h1 id="hero-title" class="split-title" data-split-title data-i18n-lines="hero.title"></h1>
          <p class="hero-text" data-reveal data-i18n="hero.body"></p>
          <div class="hero-actions" data-reveal>
            <a class="button" href="#work" data-i18n="hero.primaryCta"></a>
            <a class="ghost-link" href="#identity" data-i18n="hero.secondaryCta"></a>
          </div>
          <dl class="hero-metrics" data-reveal>
            <div>
              <dt data-i18n="hero.metricOneLabel"></dt>
              <dd data-i18n="hero.metricOne"></dd>
            </div>
            <div>
              <dt data-i18n="hero.metricTwoLabel"></dt>
              <dd data-i18n="hero.metricTwo"></dd>
            </div>
            <div>
              <dt data-i18n="hero.metricThreeLabel"></dt>
              <dd data-i18n="hero.metricThree"></dd>
            </div>
          </dl>
        </div>

        <figure class="hero-frame" data-reveal>
          <img
            src="assets/hero-perception.svg"
            width="1400"
            height="1900"
            decoding="async"
            fetchpriority="high"
            alt="Siamak Dehbokri cinematic perception artwork"
          />
          <figcaption data-i18n="hero.caption"></figcaption>
        </figure>
      </section>

      <section class="reel section-shell" aria-label="Creative proof">
        <div class="reel-track" data-reel-track></div>
      </section>

      <section class="manifesto section-shell" aria-label="Studio manifesto">
        <p class="section-kicker" data-reveal data-i18n="manifesto.kicker"></p>
        <div class="manifesto-grid">
          <h2 data-reveal data-i18n="manifesto.title"></h2>
          <p data-reveal data-i18n="manifesto.body"></p>
        </div>
      </section>

      <section class="signature section-shell" aria-labelledby="signature-title">
        <div class="section-heading" data-reveal>
          <p class="section-kicker" data-i18n="signature.kicker"></p>
          <h2 id="signature-title" data-i18n="signature.title"></h2>
        </div>
        <div class="signature-grid" data-signature-grid></div>
      </section>

      <section id="work" class="work section-shell" aria-labelledby="work-title">
        <div class="section-heading" data-reveal>
          <p class="section-kicker" data-i18n="work.kicker"></p>
          <h2 id="work-title" data-i18n="work.title"></h2>
        </div>
        <div class="project-list" data-project-list></div>
      </section>

      <section class="capabilities section-shell" aria-labelledby="capabilities-title">
        <div class="section-heading" data-reveal>
          <p class="section-kicker" data-i18n="capabilities.kicker"></p>
          <h2 id="capabilities-title" data-i18n="capabilities.title"></h2>
        </div>
        <div class="capability-grid" data-capability-grid></div>
      </section>

      <section id="method" class="process section-shell" aria-label="Creative method">
        <p class="section-kicker" data-reveal data-i18n="method.kicker"></p>
        <div class="process-line" data-method-list></div>
      </section>

      <section id="identity" class="about section-shell" aria-labelledby="about-title">
        <p class="section-kicker" data-reveal data-i18n="identity.kicker"></p>
        <div class="about-inner">
          <h2 id="about-title" data-reveal data-i18n="identity.title"></h2>
          <div class="about-copy" data-identity-copy></div>
        </div>
        <div class="experience-list" data-experience-list></div>
      </section>

      <section id="contact" class="contact section-shell" aria-labelledby="contact-title">
        <p class="section-kicker" data-reveal data-i18n="contact.kicker"></p>
        <h2 id="contact-title" data-reveal data-i18n="contact.title"></h2>
        <p class="contact-note" data-reveal data-i18n="contact.note"></p>
        <div class="contact-panel" data-reveal>
          <div class="contact-list">
            <a class="contact-link" href="mailto:siamakdehbokri@gmail.com">siamakdehbokri@gmail.com</a>
            <a class="contact-phone" href="tel:+989129376847" dir="ltr" data-i18n="contact.phone"></a>
          </div>
          <div class="socials">
            <a href="https://instagram.com/Ciamak_dh" target="_blank" rel="noopener noreferrer" aria-label="Instagram">Instagram</a>
            <a href="https://t.me/ciamakd" target="_blank" rel="noopener noreferrer" aria-label="Telegram">Telegram</a>
            <a href="https://www.linkedin.com/in/siamakdehbokri" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">LinkedIn</a>
          </div>
          <div class="contact-signature" data-signature-draw aria-hidden="true">
            <span>Siamak Dehbokri</span>
            <i></i>
            <small>Brand Direction / Commercial Film</small>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span data-i18n="footer.name"></span>
      <span data-i18n="footer.role"></span>
    </footer>

    <aside class="case-study" data-case-study aria-hidden="true">
      <button class="case-backdrop" type="button" data-close-case aria-label="Close case study"></button>
      <article class="case-panel" role="dialog" aria-modal="true" aria-labelledby="case-title" tabindex="-1">
        <button class="case-close" type="button" data-close-case aria-label="Close case study">×</button>
        <div class="case-hero">
          <p class="section-kicker" data-case-category></p>
          <h2 id="case-title" data-case-title></h2>
          <p data-case-intro></p>
        </div>
        <div class="case-gallery" data-case-gallery aria-live="polite"></div>
        <div class="case-meta">
          <span data-case-year></span>
          <span data-i18n="case.inPage"></span>
        </div>
        <div class="case-grid" data-case-grid></div>
      </article>
    </aside>

    <div class="easter-egg" data-easter-egg role="status" aria-live="polite"></div>

    <script defer src="script.js"></script>
  </body>
</html>
